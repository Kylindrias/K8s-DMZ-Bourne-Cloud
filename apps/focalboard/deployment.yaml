apiVersion: apps/v1
kind: Deployment
metadata:
  name: focalboard
  namespace: focalboard
  labels:
    app: focalboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: focalboard
  template:
    metadata:
      labels:
        app: focalboard
    spec:
      containers:
        - name: focalboard
          image: mattermost/focalboard:latest
          env:
            - name: FOCALBOARD_PORT
              value: "8000"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /opt/focalboard/data
          # resources:
          #   requests:
          #     cpu: 50m
          #     memory: 64Mi
          #   limits:
          #     cpu: 500m
          #     memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: focalboard-data
        - name: config
          configMap:
            name: focalboard-config