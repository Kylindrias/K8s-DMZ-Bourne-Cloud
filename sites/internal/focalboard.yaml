apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: focalboard-tls
  namespace: focalboard
spec:
  secretName: focalboard-tls
  issuerRef:
    name: letsencrypt-cloudflare   # change to your ClusterIssuer name
    kind: ClusterIssuer
  dnsNames:
    - focalboard.bourne.cloud   # change to your hostname

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: focalboard
  namespace: focalboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`focalboard.bourne.cloud`)   # change to your hostname
      kind: Rule
      services:
        - name: focalboard
          port: 8000
  tls:
    secretName: focalboard-tls

---
# Optional: redirect HTTP -> HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: focalboard-http
  namespace: focalboard
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`focalboard.bourne.cloud`)   # change to your hostname
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik
      services:
        - name: focalboard
          port: 8000